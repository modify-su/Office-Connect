<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Primary Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Accent Indigo Gradient -->
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Inner Decorative Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#334155" stroke-width="4" stroke-dasharray="16 12" opacity="0.6" />

  <!-- Abstract Corporate HQ / Data Sync Emblem -->
  <!-- Layer 1: Left Pillar (Database / Cloud Sync) -->
  <rect x="136" y="230" width="64" height="150" rx="16" fill="url(#indigoGrad)" opacity="0.85" />
  
  <!-- Layer 2: Right Pillar (Enterprise Status) -->
  <rect x="312" y="190" width="64" height="190" rx="16" fill="url(#indigoGrad)" opacity="0.85" />

  <!-- Layer 3: Center Core Block (Sleek Floating Active Platform) -->
  <rect x="224" y="130" width="64" height="250" rx="16" fill="url(#blueGrad)" filter="url(#glow)" />

  <!-- Connector Line/Cloud Sync Arch -->
  <path d="M168 230 C 168 150, 344 150, 344 190" fill="none" stroke="#06b6d4" stroke-width="12" stroke-linecap="round" opacity="0.4" />
  
  <!-- Modern Sparkle dot on the central core -->
  <circle cx="256" cy="170" r="12" fill="#ffffff" filter="url(#glow)" />
  <circle cx="168" cy="270" r="8" fill="#e0e7ff" />
  <circle cx="344" cy="230" r="8" fill="#e0e7ff" />
</svg>
